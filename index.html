<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Қой көтеру - Squat Tracker</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    #canvas { transform: scaleX(-1); }
    body { 
      -webkit-touch-callout: none; 
      -webkit-user-select: none; 
      user-select: none;
      overscroll-behavior: none; /* Запрет обновления страницы свайпом вниз */
    }
  </style>
</head>
<body class="min-h-[100dvh] bg-black flex flex-col items-center justify-center font-sans overflow-hidden">
  
  <div class="relative w-full h-[100dvh] bg-zinc-900 overflow-hidden shadow-2xl">
    
    <video id="video" class="hidden" playsinline autoplay muted></video>
    <canvas id="canvas" class="w-full h-full object-cover hidden"></canvas>

    <div id="startOverlay" class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center z-40 px-6 text-center backdrop-blur-sm">
      <div class="w-24 h-24 mb-6 rounded-full bg-amber-500 flex items-center justify-center shadow-lg animate-pulse">
        <svg class="w-12 h-12 text-black ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <h1 class="text-4xl font-extrabold text-white mb-4 tracking-tighter">ҚОЙ КӨТЕРУ</h1>
      <p class="text-zinc-300 text-lg leading-tight">Төмендегі «БАСТАУ» түймесін басып, сайысты бастаңыз</p>
    </div>

    <div id="progressContainer" class="hidden absolute left-4 top-1/4 w-6 h-1/2 bg-black/60 rounded-full border-2 border-white/20 overflow-hidden z-30 shadow-2xl">
      <div id="progressBar" class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-amber-600 to-yellow-400 transition-all duration-75" style="height: 0%"></div>
    </div>

    <div id="counterContainer" class="hidden absolute top-10 right-6 flex flex-col items-end z-30 bg-black/80 border border-white/20 px-6 py-4 rounded-3xl shadow-2xl">
      <span class="text-amber-500 text-xs uppercase tracking-[0.2em] font-black">Есеп</span>
      <span id="counterText" class="text-7xl font-black text-white tabular-nums leading-none">0</span>
    </div>

    <div class="absolute bottom-10 inset-x-0 flex justify-center z-[100] px-6">
      <button id="toggleBtn" class="w-full max-w-sm py-5 rounded-2xl bg-white text-black font-black text-xl uppercase tracking-widest shadow-[0_20px_50px_rgba(255,255,255,0.2)] active:scale-95 transition-all">
        <span id="btnText">БАСТАУ</span>
      </button>
    </div>

  </div>

  <script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    const elements = {
      overlay: document.getElementById('startOverlay'),
      progress: document.getElementById('progressContainer'),
      bar: document.getElementById('progressBar'),
      counter: document.getElementById('counterContainer'),
      text: document.getElementById('counterText'),
      btn: document.getElementById('toggleBtn'),
      btnText: document.getElementById('btnText')
    };

    const successSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
    let isTracking = false, count = 0, isDeep = false, camera = null;

    function calculateAngle(a, b, c) {
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs((radians * 180.0) / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle;
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

    pose.onResults((results) => {
      if (!isTracking) return;

      if (canvasElement.width !== results.image.width) {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
      }

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.translate(canvasElement.width, 0);
      canvasCtx.scale(-1, 1);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.restore();

      if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;
        const leftKnee = landmarks[25], leftHip = landmarks[23], leftAnkle = landmarks[27];
        const rightKnee = landmarks[26], rightHip = landmarks[24], rightAnkle = landmarks[28];

        const useRight = (rightKnee.visibility || 0) > (leftKnee.visibility || 0);
        const hip = useRight ? rightHip : leftHip;
        const knee = useRight ? rightKnee : leftKnee;
        const ankle = useRight ? rightAnkle : leftAnkle;

        if (knee && knee.visibility > 0.6) {
          const angle = calculateAngle(hip, knee, ankle);
          const progress = Math.max(0, Math.min(100, ((170 - angle) / (170 - 100)) * 100));
          elements.bar.style.height = `${progress}%`;
          
          if (angle <= 100) {
            elements.bar.style.backgroundColor = "#22c55e";
            isDeep = true;
          } else {
            elements.bar.style.backgroundColor = "#f59e0b";
          }

          if (angle >= 160 && isDeep) {
            count++;
            isDeep = false;
            elements.text.innerText = count;
            successSound.currentTime = 0;
            successSound.play().catch(() => {});
          }
        }
      }
    });

    elements.btn.addEventListener('click', async () => {
      if (!isTracking) {
        isTracking = true;
        elements.overlay.classList.add('hidden');
        canvasElement.classList.remove('hidden');
        elements.progress.classList.remove('hidden');
        elements.counter.classList.remove('hidden');
        
        elements.btnText.innerText = 'ТОҚТАТУ';
        elements.btn.classList.replace('bg-white', 'bg-red-600');
        elements.btn.classList.replace('text-black', 'text-white');

        if (!camera) {
          camera = new Camera(videoElement, {
            onFrame: async () => { if(isTracking) await pose.send({ image: videoElement }); }
          });
        }
        await camera.start();
      } else {
        location.reload();
      }
    });
  </script>
</body>
</html>
