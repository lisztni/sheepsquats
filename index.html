<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Қой көтеру - Squat Tracker</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    #canvas { transform: scaleX(-1); }
    body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    /* Плавное свечение для шкалы */
    .glow-green { shadow-[0_0_25px_rgba(34,197,94,0.9)]; }
  </style>
</head>
<body class="min-h-[100dvh] bg-black flex items-center justify-center sm:p-4 font-sans overflow-hidden">
  
  <div class="relative w-full h-[100dvh] sm:h-auto sm:max-w-5xl sm:aspect-[4/3] md:aspect-video bg-zinc-900 sm:rounded-[2rem] overflow-hidden sm:shadow-2xl">
    
    <video id="video" class="hidden" playsinline autoplay muted></video>
    <canvas id="canvas" class="w-full h-full object-cover hidden"></canvas>

    <div class="absolute inset-x-0 bottom-0 h-40 bg-gradient-to-t from-black/80 to-transparent z-20"></div>

    <div id="startOverlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center backdrop-blur-md z-40 px-4 text-center">
      <div class="w-20 h-20 mb-6 rounded-full bg-amber-500 flex items-center justify-center shadow-[0_0_30px_rgba(245,158,11,0.5)]">
        <svg class="w-10 h-10 text-black ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <h1 class="text-4xl font-bold text-white mb-3 tracking-tight">Қой көтеру</h1>
      <p class="text-zinc-300 text-lg max-w-xs">Камераны қосу және сайысты бастау үшін түймені басыңыз</p>
    </div>

    <div id="progressContainer" class="hidden absolute left-4 sm:left-8 top-1/2 -translate-y-1/2 w-5 sm:w-8 h-1/2 bg-black/60 rounded-full border-2 border-white/30 overflow-hidden backdrop-blur-xl z-30 shadow-2xl">
      <div id="progressBar" class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-amber-600 to-yellow-400 transition-all duration-75 ease-out" style="height: 0%"></div>
    </div>

    <div id="counterContainer" class="hidden absolute top-6 right-6 flex flex-col items-end z-30 bg-black/70 backdrop-blur-md border border-white/20 px-6 py-4 rounded-3xl shadow-2xl">
      <span class="text-amber-500 text-xs sm:text-sm uppercase tracking-[0.2em] font-black mb-1">Нәтиже</span>
      <span id="counterText" class="text-7xl sm:text-8xl font-black text-white tabular-nums leading-none">0</span>
    </div>

    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-30 w-[85%] sm:w-auto">
      <button id="toggleBtn" class="w-full sm:px-12 py-5 rounded-2xl backdrop-blur-2xl bg-white/20 border-2 border-white/40 text-white font-bold flex items-center justify-center gap-4 transition-all active:scale-95 shadow-[0_10px_40px_rgba(0,0,0,0.5)]">
        <div id="btnIconContainer" class="bg-white text-black p-1 rounded-full">
           <svg id="btnIconPlay" class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
           <svg id="btnIconStop" class="w-6 h-6 fill-current hidden" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
        </div>
        <span id="btnText" class="text-xl tracking-wider uppercase">Бастау</span>
      </button>
    </div>

  </div>

  <script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    const elements = {
      overlay: document.getElementById('startOverlay'),
      progress: document.getElementById('progressContainer'),
      bar: document.getElementById('progressBar'),
      counter: document.getElementById('counterContainer'),
      text: document.getElementById('counterText'),
      btn: document.getElementById('toggleBtn'),
      btnText: document.getElementById('btnText'),
      iconPlay: document.getElementById('btnIconPlay'),
      iconStop: document.getElementById('btnIconStop')
    };

    const successSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
    let isTracking = false, count = 0, isDeep = false, camera = null;

    function calculateAngle(a, b, c) {
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs((radians * 180.0) / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle;
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

    pose.onResults((results) => {
      if (!isTracking) return;

      // ИСПРАВЛЕНИЕ РАСТЯГИВАНИЯ: Синхронизируем размер канваса с видеопотоком
      if (canvasElement.width !== results.image.width) {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
      }

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.translate(canvasElement.width, 0);
      canvasCtx.scale(-1, 1);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.restore();

      if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;
        const leftKnee = landmarks[25], leftHip = landmarks[23], leftAnkle = landmarks[27];
        const rightKnee = landmarks[26], rightHip = landmarks[24], rightAnkle = landmarks[28];

        // Выбираем ту ногу, которую лучше видно
        const useRight = rightKnee.visibility > leftKnee.visibility;
        const hip = useRight ? rightHip : leftHip;
        const knee = useRight ? rightKnee : leftKnee;
        const ankle = useRight ? rightAnkle : leftAnkle;

        if (knee.visibility > 0.6) {
          const angle = calculateAngle(hip, knee, ankle);
          const progress = Math.max(0, Math.min(100, ((170 - angle) / (170 - 90)) * 100));
          elements.bar.style.height = `${progress}%`;
          
          if (angle <= 95) {
            elements.bar.className = "absolute bottom-0 left-0 w-full transition-all duration-75 bg-green-500 shadow-[0_0_20px_rgba(34,197,94,0.8)]";
            isDeep = true;
          } else {
            elements.bar.className = "absolute bottom-0 left-0 w-full transition-all duration-75 bg-gradient-to-t from-amber-600 to-yellow-400";
          }

          if (angle >= 160 && isDeep) {
            count++;
            isDeep = false;
            elements.text.innerText = count;
            successSound.currentTime = 0;
            successSound.play().catch(() => {});
          }
        }
      }
    });

    elements.btn.addEventListener('click', async () => {
      if (!isTracking) {
        isTracking = true;
        count = 0;
        elements.text.innerText = '0';
        
        elements.overlay.classList.add('hidden');
        canvasElement.classList.remove('hidden');
        elements.progress.classList.remove('hidden');
        elements.counter.classList.remove('hidden');
        
        elements.btnText.innerText = 'Тоқтату';
        elements.iconPlay.classList.add('hidden');
        elements.iconStop.classList.remove('hidden');
        elements.btn.classList.replace('bg-white/20', 'bg-red-600/40');
        elements.btn.classList.add('border-red-500/50');

        if (!camera) {
          camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({ image: videoElement }); }
          });
        }
        await camera.start();
      } else {
        location.reload(); // Простой способ сбросить всё состояние
      }
    });
  </script>
</body>
</html>
