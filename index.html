<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Қой көтеру - Minimalist Squat Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    /* Зеркальное отображение для естественности */
    #canvas {
      transform: scaleX(-1);
    }
  </style>
</head>
<body class="min-h-screen bg-black flex items-center justify-center p-4 font-sans selection:bg-amber-500/30">
  
  <div class="relative w-full max-w-5xl aspect-[4/3] md:aspect-video bg-zinc-900 rounded-[2rem] overflow-hidden shadow-2xl ring-1 ring-white/10">
    
    <!-- Скрытое видео для MediaPipe -->
    <video id="video" class="hidden" playsinline autoplay muted></video>
    
    <!-- Основной Canvas с изображением камеры -->
    <canvas id="canvas" class="w-full h-full object-cover hidden" width="640" height="480"></canvas>

    <!-- Оверлей до старта -->
    <div id="startOverlay" class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center backdrop-blur-md z-10">
      <div class="w-24 h-24 mb-8 rounded-full bg-white/5 flex items-center justify-center border border-white/10 shadow-2xl">
        <svg class="w-10 h-10 text-white/80 ml-2" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <h1 class="text-4xl font-bold text-white mb-3 tracking-tight">Қой көтеру</h1>
      <p class="text-zinc-400 text-lg">Камераны қосу үшін бастау түймесін басыңыз</p>
    </div>

    <!-- Динамическая шкала приседания (Слева) -->
    <div id="progressContainer" class="hidden absolute left-6 top-1/2 -translate-y-1/2 w-6 h-2/3 bg-black/40 rounded-full border border-white/10 overflow-hidden backdrop-blur-md z-20 shadow-xl">
      <div id="progressBar" class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-amber-500 to-yellow-400 transition-all duration-75 ease-out" style="height: 0%"></div>
    </div>

    <!-- Минималистичный счетчик (Справа сверху) -->
    <div id="counterContainer" class="hidden absolute top-8 right-10 flex flex-col items-end z-20">
      <span class="text-white/50 text-sm uppercase tracking-widest font-bold mb-1 drop-shadow-md">Есеп</span>
      <span id="counterText" class="text-8xl font-black text-white drop-shadow-2xl tabular-nums leading-none">0</span>
    </div>

    <!-- Кнопка управления (Снизу по центру) -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-30">
      <button id="toggleBtn" class="px-8 py-4 rounded-full backdrop-blur-xl border font-semibold flex items-center gap-3 transition-all duration-300 hover:scale-105 active:scale-95 shadow-2xl bg-white/10 border-white/20 text-white hover:bg-white/20">
        <svg id="btnIconPlay" class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="btnIconStop" class="w-5 h-5 fill-current hidden" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
        <span id="btnText" class="text-lg tracking-wide">Бастау</span>
      </button>
    </div>

  </div>

  <script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    const startOverlay = document.getElementById('startOverlay');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const counterContainer = document.getElementById('counterContainer');
    const counterText = document.getElementById('counterText');
    const toggleBtn = document.getElementById('toggleBtn');
    const btnText = document.getElementById('btnText');
    const btnIconPlay = document.getElementById('btnIconPlay');
    const btnIconStop = document.getElementById('btnIconStop');

    // Звук успешного выполнения (короткий приятный "динь")
    const successSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

    let isTracking = false;
    let count = 0;
    let isDeep = false;
    let camera = null;

    function calculateAngle(a, b, c) {
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs((radians * 180.0) / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle;
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
      if (!isTracking) return;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Отрисовываем только видео (без костей и точек)
      canvasCtx.translate(canvasElement.width, 0);
      canvasCtx.scale(-1, 1);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.restore();

      if (results.poseLandmarks) {
        const rightHip = results.poseLandmarks[24];
        const rightKnee = results.poseLandmarks[26];
        const rightAnkle = results.poseLandmarks[28];
        
        const leftHip = results.poseLandmarks[23];
        const leftKnee = results.poseLandmarks[25];
        const leftAnkle = results.poseLandmarks[27];

        const rightVis = (rightHip.visibility + rightKnee.visibility + rightAnkle.visibility) / 3;
        const leftVis = (leftHip.visibility + leftKnee.visibility + leftAnkle.visibility) / 3;

        const hip = rightVis > leftVis ? rightHip : leftHip;
        const knee = rightVis > leftVis ? rightKnee : leftKnee;
        const ankle = rightVis > leftVis ? rightAnkle : leftAnkle;

        if (hip.visibility > 0.5 && knee.visibility > 0.5 && ankle.visibility > 0.5) {
          const angle = calculateAngle(hip, knee, ankle);
          
          // Вычисляем прогресс приседания (170 градусов = 0%, 90 градусов = 100%)
          const progress = Math.max(0, Math.min(100, ((170 - angle) / (170 - 90)) * 100));
          
          // Обновляем шкалу прогресса
          progressBar.style.height = `${progress}%`;
          
          if (angle <= 90) {
            // Достигнута нужная глубина - шкала становится ярко-зеленой
            progressBar.className = "absolute bottom-0 left-0 w-full transition-all duration-75 ease-out bg-green-500 shadow-[0_0_20px_rgba(34,197,94,0.8)]";
            isDeep = true;
          } else {
            // В процессе - градиент от желтого к оранжевому
            progressBar.className = "absolute bottom-0 left-0 w-full transition-all duration-75 ease-out bg-gradient-to-t from-amber-500 to-yellow-400";
          }

          // Логика засчитывания повторения при подъеме
          if (angle >= 160 && isDeep) {
            count += 1;
            isDeep = false;
            counterText.innerText = count;
            
            // Воспроизводим звук
            successSound.currentTime = 0;
            successSound.play().catch(() => {});
          }
        } else {
          // Если человека не видно, сбрасываем шкалу
          progressBar.style.height = '0%';
        }
      }
    });

    toggleBtn.addEventListener('click', () => {
      if (!isTracking) {
        // Инициализация звука (требует действия пользователя в браузере)
        successSound.play().then(() => {
          successSound.pause();
          successSound.currentTime = 0;
        }).catch(() => {});

        isTracking = true;
        count = 0;
        isDeep = false;
        counterText.innerText = '0';
        progressBar.style.height = '0%';
        
        startOverlay.classList.add('hidden');
        canvasElement.classList.remove('hidden');
        progressContainer.classList.remove('hidden');
        counterContainer.classList.remove('hidden');
        
        btnText.innerText = 'Тоқтату';
        btnIconPlay.classList.add('hidden');
        btnIconStop.classList.remove('hidden');
        toggleBtn.classList.replace('bg-white/10', 'bg-red-500/20');
        toggleBtn.classList.replace('border-white/20', 'border-red-500/50');
        toggleBtn.classList.replace('text-white', 'text-red-100');
        toggleBtn.classList.replace('hover:bg-white/20', 'hover:bg-red-500/30');

        if (!camera) {
          camera = new Camera(videoElement, {
            onFrame: async () => {
              if (isTracking) {
                await pose.send({ image: videoElement });
              }
            },
            width: 640,
            height: 480
          });
        }
        camera.start();

      } else {
        isTracking = false;
        if (camera) {
          camera.stop();
        }
        
        startOverlay.classList.remove('hidden');
        canvasElement.classList.add('hidden');
        progressContainer.classList.add('hidden');
        counterContainer.classList.add('hidden');
        
        btnText.innerText = 'Бастау';
        btnIconPlay.classList.remove('hidden');
        btnIconStop.classList.add('hidden');
        toggleBtn.classList.replace('bg-red-500/20', 'bg-white/10');
        toggleBtn.classList.replace('border-red-500/50', 'border-white/20');
        toggleBtn.classList.replace('text-red-100', 'text-white');
        toggleBtn.classList.replace('hover:bg-red-500/30', 'hover:bg-white/20');
      }
    });
  </script>
</body>
</html>
